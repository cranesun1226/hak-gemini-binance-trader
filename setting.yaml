# ================================================================================
# HAK GEMINI BINANCE TRADER - setting.yaml
# ================================================================================

# ================================================================================
# 거래 대상 및 실행 주기
# Trading Symbol & Cycle
# ================================================================================
# 감시 및 거래 대상 심볼이며 현재 런타임에서는 BTCUSDT만 허용됩니다.
# Trading symbol to monitor and trade; the current runtime only allows BTCUSDT.
symbol: BTCUSDT

# 전략 실행 루프를 몇 초 간격으로 반복할지 설정합니다.
# Sets how many seconds to wait between each strategy execution cycle.
cycle_interval_seconds: 60

# 마지막 트리거 기준가에서 몇 % 움직이면 AI 판단을 다시 요청할지 설정하며 0.4는 0.4%를 뜻합니다.
# Sets the percent move from the last trigger price needed to request a new AI decision; 0.4 means 0.4%.
trigger_pct_usdt: 0.4

# ================================================================================
# AI 입력 및 추론 설정
# AI Input & Reasoning
# ================================================================================
# 각 타임프레임(현재 1d, 1h)별로 AI 프롬프트에 포함할 최근 캔들 개수입니다.
# Number of recent candles per timeframe, currently 1d and 1h, included in the AI prompt.
ai_candle_count_per_timeframe: 24

# Gemini 추론 강도를 설정하며 minimal, low, medium, high 중 하나를 사용합니다.
# Sets the Gemini reasoning level; use one of minimal, low, medium, or high.
gemini_thinking_level: high

# ================================================================================
# 리스크 관리
# Risk Management
# ================================================================================
# 포지션 진입 시 고정으로 적용할 레버리지 배수입니다.
# Fixed leverage multiplier applied when opening a position.
fixed_leverage: 10

# 전체 계좌 기준 손절 리스크 비율이며, 0.04는 계좌 기준 4% 손실을 뜻하고 현재 포지션의 실질 레버리지에 맞춰 평단가 기준 손절 거리로 자동 변환됩니다.
# Account-level stop-loss risk ratio; 0.04 means a 4% account risk budget and is converted into an entry-price stop distance using the position's effective leverage.
stop_loss_pct: 0.04

# ================================================================================
# 변동성 기반 포지션 사이징
# Volatility-Based Position Sizing
# ================================================================================
# 일봉 변동성 랭크 계산에 사용할 과거 일봉 샘플 개수입니다.
# Number of historical daily candles used for daily volatility rank calculations.
position_sizing_daily_sample_days: 25

# 현재 변동성 계산에 사용할 최근 1시간봉 구간 길이입니다.
# Length of the recent 1-hour candle window used to measure current volatility.
position_sizing_live_window_hours: 24

# 25일 샘플 기준 rank 1은 2% 증거금 사용 비율에 대응합니다.
# With the 25-day sample, rank 1 maps to a 2% margin usage ratio.
position_size_ratio_min: 0.02

# 25일 샘플 기준 rank 25는 98% 증거금 사용 비율에 대응합니다.
# With the 25-day sample, rank 25 maps to a 98% margin usage ratio.
position_size_ratio_max: 0.98
