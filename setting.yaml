# ================================================================================
# HAK GEMINI BINANCE TRADER - setting.yaml
# ================================================================================

# ================================================================================
# 거래 대상 및 실행 주기
# Trading Symbol & Cycle
# ================================================================================
# 감시 및 거래 대상 심볼이며 현재 런타임에서는 BTCUSDT만 허용됩니다.
# Trading symbol to monitor and trade; the current runtime only allows BTCUSDT.
symbol: BTCUSDT

# 가격 변동 감시 루프를 몇 초 간격으로 반복할지 설정합니다.
# Sets how many seconds to wait between each price-monitoring cycle.
cycle_interval_seconds: 60

# 마지막 AI 트리거 기준가에서 몇 % 움직이면 AI 판단을 다시 요청할지 설정하며 0.75는 0.75%를 뜻합니다.
# Sets the percent move from the last AI trigger price needed to request a new AI decision; 0.75 means 0.75%.
trigger_pct_usdt: 0.75

# ================================================================================
# AI 입력 및 추론 설정
# AI Input & Reasoning
# ================================================================================
# AI 프롬프트에 전달할 타임프레임입니다. 현재 런타임은 15m만 지원합니다.
# Timeframe delivered to the AI prompt. The current runtime supports only 15m.
ai_prompt_timeframe: 15m

# AI 프롬프트에 포함할 최근 15분봉 개수입니다.
# Number of recent closed 15-minute candles included in the AI prompt.
ai_prompt_candle_count: 100

# Gemini 3.1 Pro Preview 추론 강도를 설정하며 low, medium, high 중 하나를 사용합니다.
# Sets the Gemini 3.1 Pro Preview reasoning level; use one of low, medium, or high.
gemini_thinking_level: high

# ================================================================================
# 리스크 관리
# Risk Management
# ================================================================================
# 포지션 진입 시 고정으로 적용할 레버리지 배수입니다.
# Fixed leverage multiplier applied when opening a position.
fixed_leverage: 10

# 전체 계좌 기준 손절 리스크 비율이며, 0.04는 계좌 기준 4% 손실을 뜻하고 현재 포지션의 실질 레버리지에 맞춰 평단가 기준 손절 거리로 자동 변환됩니다.
# Account-level stop-loss risk ratio; 0.04 means a 4% account risk budget and is converted into an entry-price stop distance using the position's effective leverage.
stop_loss_pct: 0.04

# 신규 진입 및 방향 전환 시 사용할 고정 증거금 비율입니다.
# Fixed margin usage ratio applied on a fresh entry or reversal.
initial_position_size_ratio: 0.4
