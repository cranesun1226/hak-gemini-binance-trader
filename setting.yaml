# ================================================================================
# HAK GEMINI BINANCE TRADER - setting.yaml
# ================================================================================

# ================================================================================
# 거래 대상 및 실행 주기
# Trading Symbol & Cycle
# ================================================================================
# 감시 및 거래 대상 심볼이며 현재 런타임에서는 BTCUSDT만 허용됩니다.
# Trading symbol to monitor and trade; the current runtime only allows BTCUSDT.
symbol: BTCUSDT

# 가격 변동 감시 루프를 몇 초 간격으로 반복할지 설정합니다.
# Sets how many seconds to wait between each price-monitoring cycle.
cycle_interval_seconds: 60

# 마지막 AI 트리거 기준가에서 몇 % 움직이면 AI 판단을 다시 요청할지 설정하며 0.75는 0.75%를 뜻합니다.
# Sets the percent move from the last AI trigger price needed to request a new AI decision; 0.75 means 0.75%.
trigger_pct_usdt: 0.75

# ================================================================================
# AI 입력 및 추론 설정
# AI Input & Reasoning
# ================================================================================
# AI 프롬프트에 전달할 타임프레임입니다. 현재 런타임은 1h만 지원합니다.
# Timeframe delivered to the AI prompt. The current runtime supports only 1h.
ai_prompt_timeframe: 1h

# AI 프롬프트에 포함할 최근 1시간봉 개수입니다.
# Number of recent 1-hour candles included in the AI prompt.
ai_prompt_candle_count: 100

# Gemini 3.1 Pro Preview 추론 강도를 설정하며 low, medium, high 중 하나를 사용합니다.
# Sets the Gemini 3.1 Pro Preview reasoning level; use one of low, medium, or high.
gemini_thinking_level: high

# ================================================================================
# 리스크 관리
# Risk Management
# ================================================================================
# 포지션 진입 시 고정으로 적용할 레버리지 배수입니다.
# Fixed leverage multiplier applied when opening a position.
fixed_leverage: 10

# 전체 계좌 기준 손절 리스크 비율이며, 0.04는 계좌 기준 4% 손실을 뜻하고 현재 포지션의 실질 레버리지에 맞춰 평단가 기준 손절 거리로 자동 변환됩니다.
# Account-level stop-loss risk ratio; 0.04 means a 4% account risk budget and is converted into an entry-price stop distance using the position's effective leverage.
stop_loss_pct: 0.04

# ================================================================================
# 변동성 기반 포지션 사이징
# Volatility-Based Position Sizing
# ================================================================================
# 일봉 변동성 랭크 계산에 사용할 과거 일봉 샘플 개수입니다.
# Number of historical daily candles used for daily volatility rank calculations.
position_sizing_daily_sample_days: 25

# 현재 변동성 계산에 사용할 최근 1시간봉 구간 길이입니다.
# Length of the recent 1-hour candle window used to measure current volatility.
position_sizing_live_window_hours: 24

# 최초 진입 또는 방향 전환 직후에 고정으로 사용할 증거금 비율입니다.
# Fixed initial margin usage ratio applied on a fresh entry or immediately after a reversal.
initial_position_size_ratio: 0.4

# true 이면 현재처럼 수익 unlock 이후 변동성 기반 추가 포지션 사이징을 허용합니다.
# false 이면 profit unlock 및 변동성 기반 증액을 끄고, 포지션 비중을 initial_position_size_ratio 로 계속 유지합니다.
# When true, the runtime keeps the current profit-unlock flow and allows volatility-based add-on sizing afterward.
# When false, profit unlock and volatility-based resizing are disabled and the position stays anchored to initial_position_size_ratio.
enable_auto_position: false

# 최초 진입가 기준 unlock 최소 퍼센트입니다. 실제 unlock 기준은 이 값과 최근 24개 1시간봉 중 최대 단일봉 변동폭(high-low)/(midpoint) 중 더 큰 값으로 lock 상태에서 계속 갱신됩니다.
# Minimum profit unlock floor from the initial entry price. While still locked, the runtime keeps using the larger of this value and the biggest single-candle 1h range pct from the latest 24-hour window.
profit_activation_pct: 0.01

# unlock 이후 변동성 기반 추가 포지션 사이징이 도달할 수 있는 최대 증거금 비율입니다.
# Maximum margin usage ratio available after the profit gate unlocks volatility-based resizing.
position_size_ratio_max: 0.98
